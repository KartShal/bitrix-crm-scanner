<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Сканер</title>
    <script src="https://api.bitrix24.com/api/v1/"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 15px; background: #f4f7f9; text-align: center; }
        video { width: 100%; max-width: 400px; border-radius: 8px; background: #000; transform: scaleX(1); }
        button { background: #2fc6f6; color: #fff; border: none; padding: 12px 24px; font-size: 16px; border-radius: 5px; margin-top: 15px; cursor: pointer; width: 100%; max-width: 400px; }
        button:active { background: #17b3e3; }
        #info { margin-top: 10px; font-size: 14px; color: #535c69; }
    </style>
</head>
<body>

    <div id="info">Инициализация Битрикс24...</div>
    
    <video id="webcam" autoplay playsinline></video>
    
    <button id="capture-btn">Сделать скан документа</button>
    
    <canvas id="output-canvas" style="display:none;"></canvas>

    <script>
        let currentDealId = null;
        const video = document.getElementById('webcam');

        // 1. Инициализируем Битрикс24 SDK
        BX24.init(function() {
            // Получаем контекст (откуда открыли приложение)
            const context = BX24.placement.info();
            currentDealId = context.options.ID;
            document.getElementById('info').innerText = `ID текущей сделки: ${currentDealId}`;
            
            // Запускаем камеру
            startCamera();
        });

        // 2. Функция включения задней камеры смартфона
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: { exact: "environment" } // Требуем именно заднюю камеру
                    },
                    audio: false
                });
                video.srcObject = stream;
            } catch (error) {
                console.log("Задняя камера не найдена, пробуем любую доступную...");
                // Фоллбек на любую камеру, если exact environment выдал ошибку (например, на ПК)
                try {
                    const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                    video.srcObject = fallbackStream;
                } catch (e) {
                    document.getElementById('info').innerText = "Ошибка доступа к камере: " + e.message;
                }
            }
        }

        // 3. Обработка клика по кнопке
        document.getElementById('capture-btn').addEventListener('click', () => {
            const canvas = document.getElementById('output-canvas');
            const context = canvas.getContext('2d');
            
            // Устанавливаем размер canvas равным разрешению видео
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Рисуем текущий кадр из видео на canvas
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Получаем картинку в base64 (пока JPEG для теста)
            const base64Image = canvas.toDataURL('image/jpeg', 0.9);
            
            alert(`Кадр захвачен для сделки №${currentDealId}! Длина строки: ${base64Image.length} символов.`);
            
            // Сюда следующим шагом добавим отправку файла через BX24.callMethod('crm.deal.update', ...)
        });
    </script>
</body>
</html>
